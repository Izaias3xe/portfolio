<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Portfólio - Izaias3xe</title>
</head>
<body>
    <div class="particulas">
        <div class="orbita">
            <div class="p p1"></div>
            <div class="p p2"></div>
        </div>
    </div>
    <header class="reveal">
        <nav>
            <a href="#home">Home</a>
            <a href="#aboutme">About Me</a>
            <a href="#projects">Projects</a>
        </nav>
    </header>
    <main class="reveal">
        <div id="home" class="home">
            <h1 class="hero-title">
                <span>I</span>
                <span>Z</span>
                <span>A</span>
                <span>I</span>
                <span>A</span>
                <span>S</span>

                <span class="space"></span>

                <span>3</span>
                <span>X</span>
                <span>E</span>
            </h1>
            <div class="p-home">
                <div class="pontinhosapple">
                    <div class="pontovermelho"></div>
                    <div class="pontoamarelo"></div>
                    <div class="pontoverde"></div>
                </div>
                <p id="typing-text" class="typing"></p>
            </div>
        </div>
        <div class="container-about">
            <div class="aboutme scroll-reveal" id="aboutme">
                <img src="assets/img/aboutme.png" alt="Eu">
                <div class="p-about" id="terminal-about">
                    <div class="pontinhosapple">
                        <div class="pontovermelho2" id="redbutton"></div>
                        <div class="pontoamarelo"></div>
                        <div class="pontoverde"></div>
                    </div>
                    <p id="typing-text2" class="typing"></p>
                </div>
            </div>
            <div class="stacks">
                <h1>Stacks</h1>
                <div class="stacksicons">
                    <i class="devicon-nextjs-original-wordmark stackicon"></i>
                    <i class="devicon-react-original stackicon"></i>
                    <i class="devicon-javascript-plain stackicon"></i>
                    <i class="devicon-typescript-plain stackicon"></i>
                    <i class="devicon-python-plain stackicon"></i>
                    <i class="devicon-cplusplus-plain stackicon"></i>
                    <i class="devicon-php-plain stackicon"></i>
                    <i class="devicon-mysql-plain-wordmark stackicon"></i>
                    <i class="devicon-html5-plain stackicon"></i>
                    <i class="devicon-css3-plain stackicon"></i>
                    <i class="devicon-tailwindcss-original stackicon"></i>
                    <i class="devicon-kalilinux-original stackicon"></i>
                    <i class="devicon-git-plain stackicon"></i>
                    <i class="bi bi-terminal-fill stackicon" id="terminalIcon"></i>
                </div>
            </div>
        </div>
        <div class="container-projects" id="projects">
            <h1>Projects</h1>
            <div class="projects">
                <div class="project">
                    <img src="assets/img/project1.png" alt="Flow Outfit">
                    <div class="icons">
                        <i class="devicon-nextjs-original-wordmark"></i>
                        <i class="devicon-react-original"></i>
                        <i class="devicon-tailwindcss-original"></i>
                        <i class="devicon-css3-plain"></i>
                    </div>
                </div>
                <div class="project">
                    <img src="assets/img/project1.png" alt="Flow Outfit">
                    <div class="icons">
                        <i class="devicon-nextjs-original-wordmark"></i>
                        <i class="devicon-react-original"></i>
                        <i class="devicon-tailwindcss-original"></i>
                        <i class="devicon-css3-plain"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script src="/js/script.js"></script>
</body>
</html>
